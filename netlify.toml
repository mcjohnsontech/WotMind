# Netlify configuration for Wotmind
# The @netlify/plugin-nextjs handles routing, ISR, and middleware automatically.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Pin a recent LTS Node — Next 16 requires >= 20.
  NODE_VERSION = "20"
  # Quiets npm output during the build.
  NPM_FLAGS = "--prefer-offline --no-audit --progress=false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Long-lived caching for hashed static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
